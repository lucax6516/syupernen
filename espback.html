    <script>
        function getRandomViewers() {
            return Math.floor(Math.random() * (920 - 700 + 1)) + 700;
        }

        function getTodayFormatted() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            return `${day}/${month}/${year}`;
        }

        const viewerSpan = document.getElementById('liveCounterDisplay');
        const dateSpan = document.getElementById('limitDayDisplay');

        if (viewerSpan) viewerSpan.textContent = getRandomViewers();
        if (dateSpan) dateSpan.textContent = getTodayFormatted();

        setInterval(function() {
            if (viewerSpan) viewerSpan.textContent = getRandomViewers();
        }, Math.random() * 5000 + 5000);
