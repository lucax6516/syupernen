<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Gratuita</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17873578635"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-17873578635');
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #1a0a0a 0%, #4a0f0f 30%, #6b1515 60%, #4a0f0f 100%);
            background-attachment: fixed;
            color: #ffffff;
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            min-height: 100vh;
        }
        
        .image-container {
            width: 100%;
            max-width: 750px;
            margin-bottom: 40px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .image-container img {
            display: block;
            width: 100%;
            height: auto;
        }
        
        .presentation-text {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 35px;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .presentation-text .highlight {
            color: #ff4444;
            font-weight: 700;
        }
        
        .watch-button {
            background: linear-gradient(180deg, #e53935 0%, #c62828 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 18px 50px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(229, 57, 53, 0.4);
        }
        
        .watch-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(229, 57, 53, 0.5);
            background: linear-gradient(180deg, #ef5350 0%, #d32f2f 100%);
        }
        
        .watch-button svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }
        
        .watch-button:hover svg {
            transform: translateX(4px);
        }
        
        .footer {
            margin-top: auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 11px;
        }
        
        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.5);
        }
        
        @media (max-width: 600px) {
            .main-content { padding: 30px 15px; }
            .image-container { margin-bottom: 30px; }
            .presentation-text { font-size: 22px; margin-bottom: 25px; }
            .watch-button { font-size: 16px; padding: 16px 35px; width: 100%; max-width: 320px; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="image-container">
            <img src="capa-presell.jpg" alt="Presentación Especial">
        </div>
        
        <p class="presentation-text">Haz clic en el botón de abajo para ver la<br>presentación <span class="highlight">¡GRATIS!</span></p>
        
        <a href="/aulaesp.html" class="watch-button" id="ctaButton">
            VER AHORA
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
        </a>
    </div>
    
    <footer class="footer">
        <div class="footer-links">
            <a href="politica-privacidad.html">Privacidad</a>
            <a href="termos-uso.html">Términos</a>
            <a href="aviso-legal.html">Aviso Legal</a>
            <a href="politica-reembolso.html">Reembolso</a>
        </div>
    </footer>

    <script>
        (function() {
            const currentParams = window.location.search;
            if (currentParams) {
                const ctaButton = document.getElementById('ctaButton');
                const baseUrl = ctaButton.getAttribute('href');
                ctaButton.setAttribute('href', baseUrl + currentParams);
                
                const footerLinks = document.querySelectorAll('.footer-links a');
                footerLinks.forEach(function(link) {
                    const linkHref = link.getAttribute('href');
                    if (!linkHref.startsWith('http') && !linkHref.startsWith('#')) {
                        link.setAttribute('href', linkHref + currentParams);
                    }
                });
            }
        })();
    </script>

</body>
</html>
